version: "3.9"

services:

  db:
    image: postgres:17
    container_name: atlas_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aitbek
      POSTGRES_DB: atlas_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: atlas_redis
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: atlas_minio
    restart: always

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: atlas
      MINIO_ROOT_PASSWORD: atlaspassword

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  api:
    build: .
    container_name: atlas_api
    restart: always

    depends_on:
      - db
      - redis
      - minio

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

  nginx:
    image: nginx:latest
    container_name: atlas_nginx
    restart: always

    depends_on:
      - api

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  minio_data: