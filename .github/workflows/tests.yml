name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: aitbek
          POSTGRES_DB: atlas_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:aitbek@localhost:5432/atlas_db
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:aitbek@localhost:5432/atlas_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: atlas_secret_key_2026
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: atlas
      MINIO_SECRET_KEY: atlaspassword
      MINIO_BUCKET: avatars
      TESTING: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=aitbek psql -h localhost -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='atlas_test'" | grep -q 1 || \
          PGPASSWORD=aitbek psql -h localhost -U postgres -c "CREATE DATABASE atlas_test;"

      - name: Run tests
        run: pytest